---
fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-case-conflict
      - id: check-json
      - id: mixed-line-ending
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv run black
        language: system
        types: [python]

      - id: flake8
        name: flake8
        entry: uv run flake8
        language: system
        types: [python]

      - id: yamllint
        name: yamllint
        entry: uv run yamllint
        language: system
        types: [yaml]

      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        files: ^typecats/
        args:
          - --fail-under=8.5

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        args:
          - --show-traceback
          - --ignore-missing-imports
          - --check-untyped-defs
          - typecats
